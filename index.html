<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Swipe</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Header containing the logo and website name */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;              /* Space between logo and text */
            padding: 40px 0;
        }

        .logo {
            width: 500px;
            height: auto;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="images/logo.png" alt="Website Logo" class="logo">
    </div>

</body>
</html>
